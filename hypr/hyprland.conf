monitor=HDMI-A-1,1920x1080@165,0x0,1

$terminal = kitty
$menu = wofi --show drun -i

# $discord = discord
$explorer = thunar

exec-once = clipman store 
exec-once = eww open tuxclock 
exec-once = eww open status_bar
exec-once = nm-applet
exec-once = systemctl start --now --user hyprpolkitagent
exec-once = signal-desktop
exec-once = discord --start-minimized 
exec-once = discover-overlay
exec-once = emacs --daemon

# env = XCURSOR_SIZE,24
# env = HYPRCURSOR_SIZE,24

env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = ELECTRON_OZONE_PLATFORM_HINT,auto

general {
	gaps_in  = 5
	gaps_out = 15
	border_size = 0
	col.active_border = rgb(C8C093)
	col.inactive_border = rgb(363646)
	resize_on_border = false
	layout = master

	allow_tearing = true
}

decoration {
	rounding = 0
	dim_inactive = false
	dim_strength = 0.3
	active_opacity = 1.0
	inactive_opacity = 1.0

	blur {
	    enabled = true
	    size = 5
	    passes = 2
	    noise = 0
	    vibrancy = 0.9
	}
	shadow{
		enabled = false
	}
}

animations {
	enabled = false
}

# dwindle {
# 	pseudotile = true
# 	preserve_split = true
# }

master {
	new_status = master
	new_on_top = true
	# orientation = "center"
}

misc {
	force_default_wallpaper = 0
	disable_hyprland_logo = true
	background_color = 0x16161D
}

input {
	kb_layout = us
	kb_variant =
	kb_model =
	kb_options =
	kb_rules =
	accel_profile = flat
	sensitivity = 0
	# force_no_accel = true
	# follow_mouse = 1
}

$mainMod = SUPER 
$screenShot = grim -g "$(slurp)"

bind = $mainMod SHIFT, RETURN, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod , SPACE, togglefloating,
bind = $mainMod, e, exec, emacsclient -c
bind = $mainMod, slash, exec, signal-desktop
bind = $mainMod, M, fullscreen

bind = $mainMod, o, pin

bind = $mainMod, P, exec, $menu
bind = $mainMod, W, exec, nm-applet
bind = $mainMod SHIFT, P, exec, $screenShot

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod, TAB, workspace, e+1
bind = $mainMod SHIFT, TAB, workspace, e-1

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# bind = $mainMod, W, exec, pkill waybar ; waybar &

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bind = $mainMod, RETURN, layoutmsg, swapwithmaster master

bind = $mainMod, K, layoutmsg, cycleprev
bind = $mainMod, J, layoutmsg, cyclenext

bind = $mainMod, I, layoutmsg, addmaster
bind = $mainMod, D, layoutmsg, removemaster

bind = $mainMod, L, resizeactive, 100 0
bind = $mainMod, H, resizeactive, -100 0
bind = $mainMod SHIFT, mouse_down, movetoworkspacesilent, .+1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, discover-overlay --rpc --unmute
bindel = , XF86HomePage, exec, discover-overlay --rpc --mute

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# windowrulev2 = float,class:^(Thunar)$
# windowrulev2 = float,class:^(syncthingtray)$
# windowrulev2 = float,class:^(org.gnome.FileRoller)$
# windowrulev2 = float,class:^(winetricks)$
#
# windowrulev2 = suppressevent maximize, class:.*

windowrule = match:class kitty, border_size 2
windowrule = match:class emacs, border_size 2